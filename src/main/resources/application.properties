spring.application.name=pricewatch

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pricewatch}
spring.datasource.username=${DATABASE_USERNAME:pricewatch}
spring.datasource.password=${DATABASE_PASSWORD:pricewatch}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

evolution.api-url=${EVOLUTION_API_URL:}
evolution.instance=${EVOLUTION_INSTANCE:}
evolution.api-key=${EVOLUTION_API_KEY:}

pricewatch.allowed-store-domains=${ALLOWED_STORE_DOMAINS:mercadolivre.com.br,amazon.com.br,kabum.com.br,magazineluiza.com.br,casasbahia.com.br,carrefour.com.br,aliexpress.com,shopee.com.br,shein.com}
pricewatch.browser-url=${BROWSER_URL:}
mercadolivre.access-token=${MERCADOLIVRE_ACCESS_TOKEN:}
mercadolivre.client-id=${MERCADOLIVRE_CLIENT_ID:}
mercadolivre.client-secret=${MERCADOLIVRE_CLIENT_SECRET:}

logging.level.com.pricewatch=INFO
