services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pricewatch
      POSTGRES_PASSWORD: pricewatch
      POSTGRES_DB: pricewatch
    volumes:
      - pricewatch_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricewatch -d pricewatch"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/pricewatch
      DATABASE_USERNAME: pricewatch
      DATABASE_PASSWORD: pricewatch
      JWT_SECRET: pricewatch-local-secret-key-32-characters-minimum
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - pricewatch_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pricewatch_db:
  pricewatch_node_modules:
